name: CD

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '배포할 버전 (예: v1.0.0)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  # github.repository는 대소문자 포함 가능, Docker는 소문자만 허용
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Docker 이미지 빌드 및 푸시
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/api
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/web
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          no-cache: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_API_URL }}

  # Blue-Green 배포
  deploy:
    name: Deploy (Blue-Green)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_ACTOR
          script: |
            set -e

            VERSION="${{ needs.build-and-push.outputs.version }}"
            REGISTRY="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"

            cd ~/mma-savant

            # 최신 설정 파일 가져오기
            git pull origin main

            # GitHub Container Registry 로그인
            echo "${{ secrets.DEPLOY_GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Blue-Green 배포 스크립트 실행
            ./scripts/deploy-blue-green.sh "$VERSION" "$REGISTRY"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sleep 10
            # Nginx를 통한 health check (Blue-Green 배포에서는 Nginx가 활성 컨테이너로 라우팅)
            curl -f http://localhost/health || exit 1
            echo "✅ Health check passed!"

      - name: Notify deployment result
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if [ -f ~/mma-savant/.active-env ]; then
              ACTIVE=$(cat ~/mma-savant/.active-env)
              echo "📍 Active environment: $ACTIVE"
              echo "📍 Version: ${{ needs.build-and-push.outputs.version }}"
            fi
